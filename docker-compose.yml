services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongo
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - careerpilot-mongo:/data/db

volumes:
  careerpilot-mongo:
